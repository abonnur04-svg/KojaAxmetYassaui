services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VITE_BASE44_APP_ID=${VITE_BASE44_APP_ID}
      - VITE_BASE44_APP_BASE_URL=${VITE_BASE44_APP_BASE_URL}
    volumes:
      - tts_cache:/app/.tts-cache
    restart: unless-stopped

volumes:
  tts_cache:
