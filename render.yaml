services:
  - type: web
    name: khoja-ahmed-yasawi
    runtime: node
    plan: free
    buildCommand: npm install && pip3 install -r requirements.txt && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_BASE44_APP_ID
        sync: false
      - key: VITE_BASE44_APP_BASE_URL
        sync: false
