services:
  - type: web
    name: khoja-ahmed-yasawi-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: DISABLE_PREGEN
        value: "1"
